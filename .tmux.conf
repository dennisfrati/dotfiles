# Unbind default keys
unbind r
unbind C-b
unbind '"'
unbind '%'
unbind n

# Setting new keys
set -g prefix C-a
set -g mouse on
set -g history-limit 100000
set-option -g status on
set-option -g status-interval 5
set-option -g status-keys vi
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -g monitor-activity off
set -g bell-action none

#  modes
set -g clock-mode-colour colour5
set -g mode-style 'fg=colour1 bg=colour16'

# panes
set -g pane-border-style 'fg=colour8 bg=default'
set -g pane-active-border-style 'bg=default fg=colour145'

# statusbar
set -g status-position top
set -g status-justify left
set -g status-style ''
set -g status-left ''
set -g status-right '#[fg=colour255,bg=black] #(${HOME}/.tmux/status.sh)'
set -g status-right-length 250
set -g status-left-length 50

set -g window-status-current-style 'fg=colour196 bg=colour145 bold'
set -g window-status-current-format '#[fg=black][#S] #[fg=colour196]#I#[fg=colour239]:#[fg=colour255]#W#[fg=colour239]#F '
set -g window-status-style 'fg=colour9 bg=colour8'
set -g window-status-format ' #I#[fg=colour237]:#[fg=colour250]#W#[fg=colour244]#F '
set -g window-status-bell-style 'fg=colour255 bg=colour1 bold'

# messages
set -g message-style 'fg=colour232 bg=colour16 bold'

# Binding new keys
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind r source-file $HOME/.tmux.conf \; display "Configuration reloading"
bind n command-prompt "rename-window '%%'"
